name: Fetch Coffee Prices

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and update prices
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 fetch_prices.py
