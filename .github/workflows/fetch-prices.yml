name: Fetch Coffee Prices

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetch script
        run: python3 fetch_prices.py

      - name: Update Gist with gh CLI
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f updated_prices.json ]; then
            gh gist edit d4d3e60a5fa00da0a7ee0128ac577304 -f prices.json < updated_prices.json
            echo "Gist updated successfully"
          else
            echo "No price data to update"
          fi
